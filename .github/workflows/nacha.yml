name: NACHA Daily Report

on:
  schedule:
    - cron: '47 5 * * *'  # Runs daily at 7:30 PM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install azure-identity azure-monitor-query pandas openpyxl requests

      - name: Run Script
        env:
          # -------- Tenant A (Azure Logs) --------
          TENANT_ID_A: ${{ secrets.TENANT_ID_A }}
          CLIENT_ID_A: ${{ secrets.CLIENT_ID_A }}
          CLIENT_SECRET_A: ${{ secrets.CLIENT_SECRET_A }}

          # -------- Tenant B (Graph Email) --------
          MAIL_TENANT_ID: ${{ secrets.MAIL_TENANT_ID }}
          MAIL_CLIENT_ID: ${{ secrets.MAIL_CLIENT_ID }}
          MAIL_CLIENT_SECRET: ${{ secrets.MAIL_CLIENT_SECRET }}

          # -------- Email --------
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}

        run: python azure_logs.py
