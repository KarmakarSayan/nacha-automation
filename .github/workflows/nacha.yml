name: NACHA Daily Report

on:
  schedule:
    - cron: '0 3 * * *'   # Runs daily at 3 AM UTC
  workflow_dispatch:      # Manual run button

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install azure-identity azure-monitor-query pandas openpyxl

      - name: Run Script
        env:
          TENANT_ID: ${{ vars.TENANT_ID }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
          CLIENT_SECRET: ${{ vars.CLIENT_SECRET }}
          SMTP_EMAIL: ${{ vars.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ vars.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ vars.RECEIVER_EMAIL }}
        run: python azure_logs.py
